<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHORDER</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #ccccee;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  /* ---- Title bar ---- */
  header {
    width: 100%;
    background: #16213e;
    padding: 18px 0 14px;
    text-align: center;
    letter-spacing: 6px;
    font-size: 1.35rem;
    font-weight: 800;
    color: #e8a44a;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2a4a;
    margin-bottom: 20px;
  }

  /* ---- Setup panel ---- */
  #setup {
    background: #16213e;
    border: 1px dashed #3a3a5a;
    border-radius: 12px;
    padding: 22px 30px;
    text-align: center;
    max-width: 460px;
    width: 90%;
    margin-bottom: 24px;
    transition: opacity .3s;
  }
  #setup.hidden { display: none; }

  #setup p { font-size: .88rem; color: #8888aa; line-height: 1.7; margin-bottom: 14px; }
  #setup code {
    background: #0d1b2a;
    color: #5a9fd4;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: .82rem;
  }

  #loadBtn {
    display: inline-block;
    cursor: pointer;
    background: #e8a44a;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    padding: 10px 26px;
    font-size: .9rem;
    font-weight: 700;
    letter-spacing: 1px;
    transition: background .15s;
  }
  #loadBtn:hover { background: #f0b85a; }
  #fileInput { display: none; }

  /* ---- Status badge ---- */
  #status {
    font-size: .78rem;
    color: #888;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  #status.ok { color: #6dbf87; }
  #status.err { color: #e05a5a; }

  /* ---- Chord grid ---- */
  .grid-wrap {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
  }

  .col-headers {
    display: grid;
    grid-template-columns: 28px 1fr 1fr;
    gap: 8px;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .col-headers span {
    text-align: center;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .col-headers .maj { color: #e8a44a; }
  .col-headers .min { color: #5a9fd4; }

  .chord-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr;
    gap: 8px;
    margin-bottom: 7px;
    align-items: center;
  }

  .key-num {
    text-align: center;
    font-size: .85rem;
    font-weight: 700;
    color: #666688;
    font-family: ui-monospace, monospace;
  }

  /* ---- Chord button ---- */
  .chord-btn {
    position: relative;
    border: none;
    border-radius: 8px;
    padding: 10px 4px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .06s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: none;  /* pointer events を確実に受け取る */
  }
  .chord-btn:active,
  .chord-btn.on { transform: scale(.95); }
  .chord-btn:disabled { opacity: .35; cursor: default; }

  /* Major */
  .chord-btn.maj       { background: #3a3050; color: #8888aa; }
  .chord-btn.maj.on    { background: #e8a44a; color: #1a1a2e; box-shadow: 0 0 14px #e8a44a55; }
  .chord-btn.maj:hover:not(:disabled):not(.on) { background: #4a4060; }

  /* Minor */
  .chord-btn.min       { background: #1e2d3d; color: #8888aa; }
  .chord-btn.min.on    { background: #5a9fd4; color: #1a1a2e; box-shadow: 0 0 14px #5a9fd455; }
  .chord-btn.min:hover:not(:disabled):not(.on) { background: #2a3d4d; }


  @media (max-width: 400px) {
    .chord-btn { font-size: .78rem; padding: 9px 2px; }
    .key-num { font-size: .75rem; }
  }
</style>
</head>
<body>

<header>⬡ &nbsp; C H O R D E R &nbsp; ⬡</header>

<p id="status"></p>
<div id="setup" class="hidden" aria-hidden="true"></div>

<!-- Chord grid -->
<div class="grid-wrap">
  <div class="col-headers">
    <span></span>
    <span class="maj">MAJOR</span>
    <span class="min">minor</span>
  </div>
  <div id="grid"></div>
</div>

<script>
// -------------------------------------------------------
// Chord data — parallel to RNBO parameter indices 0..23
// -------------------------------------------------------
// キー: Major 1–0 - =  /  minor Shift+同キー (! … +)
const MAJ_KEYS = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0", "-", "="];
const MIN_KEYS = ["!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "_", "+"];

// RNBO パラメータ index 0..23 に対応する正しい MIDI 音（3和音）
// rnbo_source.cpp の message_XX_init と同期
const PARAM_MIDI = [
  [60, 64, 67], // 0  CM  C major
  [60, 63, 67], // 1  Cm  C minor
  [61, 65, 68], // 2  DfM D♭ major
  [61, 64, 68], // 3  Dfm D♭ minor
  [62, 66, 69], // 4  DM  D major
  [62, 65, 69], // 5  Dm  D minor
  [63, 67, 70], // 6  EfM E♭ major
  [63, 66, 70], // 7  Efm E♭ minor
  [64, 68, 71], // 8  EM  E major
  [64, 67, 71], // 9  Em  E minor
  [65, 69, 72], // 10 FM  F major
  [65, 68, 72], // 11 Fm  F minor
  [66, 70, 73], // 12 GfM G♭ major
  [66, 69, 73], // 13 Gfm G♭ minor
  [67, 71, 74], // 14 GM  G major
  [67, 70, 74], // 15 Gm  G minor
  [68, 72, 75], // 16 AfM A♭ major
  [68, 71, 75], // 17 Afm A♭ minor
  [69, 73, 76], // 18 AM  A major
  [69, 72, 76], // 19 Am  A minor
  [70, 74, 77], // 20 BfM B♭ major
  [70, 73, 77], // 21 Bfm B♭ minor
  [71, 75, 78], // 22 BM  B major
  [71, 74, 78], // 23 Bm  B minor
];

const CHORDS = [
  { key: "C",  majIndex: 0,  minIndex: 1,  majLabel: "C",  minLabel: "Cm",  majKey: "1", minKey: "!" },
  { key: "D♭", majIndex: 2,  minIndex: 3,  majLabel: "D♭", minLabel: "D♭m", majKey: "2", minKey: "@" },
  { key: "D",  majIndex: 4,  minIndex: 5,  majLabel: "D",  minLabel: "Dm",  majKey: "3", minKey: "#" },
  { key: "E♭", majIndex: 6,  minIndex: 7,  majLabel: "E♭", minLabel: "E♭m", majKey: "4", minKey: "$" },
  { key: "E",  majIndex: 8,  minIndex: 9,  majLabel: "E",  minLabel: "Em",  majKey: "5", minKey: "%" },
  { key: "F",  majIndex: 10, minIndex: 11, majLabel: "F",  minLabel: "Fm",  majKey: "6", minKey: "^" },
  { key: "G♭", majIndex: 12, minIndex: 13, majLabel: "G♭", minLabel: "G♭m", majKey: "7", minKey: "&" },
  { key: "G",  majIndex: 14, minIndex: 15, majLabel: "G",  minLabel: "Gm",  majKey: "8", minKey: "*" },
  { key: "A♭", majIndex: 16, minIndex: 17, majLabel: "A♭", minLabel: "A♭m", majKey: "9", minKey: "(" },
  { key: "A",  majIndex: 18, minIndex: 19, majLabel: "A",  minLabel: "Am",  majKey: "0", minKey: ")" },
  { key: "B♭", majIndex: 20, minIndex: 21, majLabel: "B♭", minLabel: "B♭m", majKey: "-", minKey: "_" },
  { key: "B",  majIndex: 22, minIndex: 23, majLabel: "B",  minLabel: "Bm",  majKey: "=", minKey: "+" },
];

const majKeyIndex = new Map(MAJ_KEYS.map((k, i) => [k, i]));
const minKeyIndex = new Map(MIN_KEYS.map((k, i) => [k, i]));

// -------------------------------------------------------
// Build button grid
// -------------------------------------------------------
const grid = document.getElementById("grid");
const btnMap = {}; // paramIndex -> <button>

CHORDS.forEach(({ majIndex, minIndex, majLabel, minLabel, majKey }) => {
  const row = document.createElement("div");
  row.className = "chord-row";

  const keyNum = document.createElement("span");
  keyNum.className = "key-num";
  keyNum.textContent = majKey;

  const makBtn = (paramIndex, cssClass, text) => {
    const b = document.createElement("button");
    b.className = `chord-btn ${cssClass}`;
    b.textContent = text;
    b.dataset.paramIndex = String(paramIndex);

    b.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      resumeAudioIfNeeded();
      startChord(paramIndex);
    });

    btnMap[paramIndex] = b;
    return b;
  };

  row.appendChild(keyNum);
  row.appendChild(makBtn(majIndex, "maj", majLabel));
  row.appendChild(makBtn(minIndex, "min", minLabel));
  grid.appendChild(row);
});

// -------------------------------------------------------
// オーディオ（正しい MIDI 音程で 3 音）
// -------------------------------------------------------
let audioCtx   = null;
let chordSynth = null;
let pressedIndex = null;
const heldKeys = new Map(); // e.code -> paramIndex

function midiToHz(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

class ChordSynth {
  constructor(ctx) {
    this.ctx = ctx;
    this.master = ctx.createGain();
    this.master.gain.value = 0;
    this.master.connect(ctx.destination);
    this.oscs = [];
  }

  play(midiNotes) {
    this.stop(false);
    const t = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(0, t);
    this.master.gain.linearRampToValueAtTime(0.12, t + 0.02);

    midiNotes.forEach((midi) => {
      const osc = this.ctx.createOscillator();
      osc.type = "sine";
      osc.frequency.value = midiToHz(midi);
      osc.connect(this.master);
      osc.start(t);
      this.oscs.push(osc);
    });
  }

  stop(fade = true) {
    const t = this.ctx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    if (fade) {
      this.master.gain.setValueAtTime(this.master.gain.value, t);
      this.master.gain.linearRampToValueAtTime(0, t + 0.04);
    } else {
      this.master.gain.setValueAtTime(0, t);
    }
    const oscs = this.oscs;
    this.oscs = [];
    setTimeout(() => {
      oscs.forEach((o) => {
        try { o.stop(); o.disconnect(); } catch (_) {}
      });
    }, 50);
  }
}

function setStatus(msg, cls = "") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = cls;
}

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (!chordSynth) chordSynth = new ChordSynth(audioCtx);
}

function resumeAudioIfNeeded() {
  ensureAudio();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

// -------------------------------------------------------
// 押した / 離した
// -------------------------------------------------------
function startChord(paramIndex) {
  const btn = btnMap[paramIndex];
  if (!btn) return;

  if (pressedIndex !== null && pressedIndex !== paramIndex) {
    const old = btnMap[pressedIndex];
    if (old) old.classList.remove("on");
  }

  btn.classList.add("on");
  pressedIndex = paramIndex;
  chordSynth.play(PARAM_MIDI[paramIndex]);
}

function stopChord(paramIndex) {
  if (pressedIndex !== paramIndex) return;
  const btn = btnMap[paramIndex];
  if (btn) btn.classList.remove("on");
  pressedIndex = null;
  chordSynth.stop();
}

// -------------------------------------------------------
// マウス / タッチ：グローバルに pointerup で止める
// -------------------------------------------------------
document.addEventListener("pointerup",     () => { if (pressedIndex !== null) stopChord(pressedIndex); });
document.addEventListener("pointercancel", () => { if (pressedIndex !== null) stopChord(pressedIndex); });

// -------------------------------------------------------
// キーボード（Major: 1–0 -= / minor: Shift+同キー）
// -------------------------------------------------------
function chordFromKeyEvent(e) {
  if (e.shiftKey) {
    const i = minKeyIndex.get(e.key);
    if (i === undefined) return null;
    return CHORDS[i].minIndex;
  }
  const i = majKeyIndex.get(e.key);
  if (i === undefined) return null;
  return CHORDS[i].majIndex;
}

document.addEventListener("keydown", (e) => {
  if (e.target.closest("input, textarea, select, [contenteditable=true]")) return;
  if (heldKeys.has(e.code)) return;  // 既に押されている

  const paramIndex = chordFromKeyEvent(e);
  if (paramIndex === null) return;

  e.preventDefault();
  resumeAudioIfNeeded();
  heldKeys.set(e.code, paramIndex);
  startChord(paramIndex);
});

document.addEventListener("keyup", (e) => {
  const paramIndex = heldKeys.get(e.code);
  if (paramIndex === undefined) return;
  heldKeys.delete(e.code);
  stopChord(paramIndex);
});

// Resume AudioContext on click
document.body.addEventListener("click", resumeAudioIfNeeded);

// -------------------------------------------------------
// 起動（RNBO パッチ不要・正しい音程で即演奏可能）
// -------------------------------------------------------
function initApp() {
  document.getElementById("setup").classList.add("hidden");
}

initApp();
</script>
</body>
</html>
